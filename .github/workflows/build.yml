name: Build

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name VirtualCam app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualCam-Windows
          path: dist/VirtualCam.exe

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VirtualCam.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip3 install -r requirements.txt
          pip3 install pyinstaller

      - name: Build app
        run: pyinstaller --onefile --windowed --name VirtualCam app.py

      - name: Zip .app
        run: cd dist && zip -r VirtualCam-macOS.zip VirtualCam.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualCam-macOS
          path: dist/VirtualCam-macOS.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VirtualCam-macOS.zip
